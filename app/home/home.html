        GetEditorVersion();
    </script>
    <div id="account-info" , class="account-data">
        LOADING ACCOUNT DATA...
        <script>
            GenerateAccountInfo();
        </script>
    </div>

        <button class="general-nav-button" onclick="PlayTest()">

    <div class="plugin-editor">

                SEARCH

            <div id="plugin-list" class="plugin-list">
                PLUGIN LIST
            </div>
        </div>
        <div id="display-area" class="display-area">
            <div id="parameter-selection-list" class="parameter-selection-list"></div>
            <div id="parameter-selection-editor" class="parameter-selection-editor"></div>
        </div>
    </div>
    <div id="editor-message" class="editor-message"></div>
    <script>
        LoadSynrecPlugins();
        LoadImagePreload();
        LoadAudioPreload();
    </script>
